  <title>PIPQ - Cadastro de Membros</title>

  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>

<header class="header">
  <div class="brand">
    <img src="img/logo pipq.jpeg" alt="PIPQ Logo" class="logo" />

    <div class="brand-text">
      <h1>PIPQ</h1>
      <p>Primeira Igreja Presbiteriana em Queimados</p>
      <span>Cadastro de Membros e Visitantes</span>
    </div>
  </div>
</header>

<section>

<form method="post" enctype="multipart/form-data">

  <!-- DADOS PESSOAIS -->
  <fieldset>
    <legend>Dados Pessoais</legend>

    <label>Nome completo</label>
    <input type="text" name="nome" required />

    <label>Data de nascimento</label>
    <input type="date" name="nascimento" required />

    <label>Email</label>
    <input type="email" name="email" required />

    <label>Telefone</label>
    <input type="tel" name="telefone" placeholder="(21) 99999-9999" />

    <label>Foto</label>
    <input type="file" accept="image/*" />
  </fieldset>

  <!-- ENDEREÇO -->
  <fieldset>
    <legend>Endereço</legend>

    <label>Estado</label>
    <select name="estado">
      <option>Selecione...</option>
      <option>Rio de Janeiro</option>
      <option>São Paulo</option>
      <option>Minas Gerais</option>
    </select>

    <label>Cidade</label>
    <input type="text" name="cidade" />

    <label>Endereço</label>
    <input type="text" name="endereco" />
  </fieldset>

  <!-- PERFIL -->
  <fieldset>
    <legend>Perfil</legend>

    <p>Gênero</p>
    <label><input type="radio" name="genero" value="Feminino"> Feminino</label>
    <label><input type="radio" name="genero" value="Masculino"> Masculino</label>
    <label><input type="radio" name="genero" value="Outro"> Outro</label>

    <label>Estado civil</label>
    <select name="estadoCivil">
      <option>Solteiro</option>
      <option>Casado</option>
      <option>Divorciado</option>
    </select>
  </fieldset>

  <!-- VIDA NA IGREJA -->
  <fieldset>
    <legend>Vida na Igreja</legend>

    <label>É membro?</label>
    <select name="membro">
      <option>Sim</option>
      <option>Não</option>
      <option>Visitante</option>
    </select>

    <label>Batizado?</label>
    <select name="batizado">
      <option>Sim</option>
      <option>Não</option>
    </select>

    <label>Ministério</label>
    <input type="text" name="ministerio" placeholder="Ex: Louvor, Jovens..." />

    <label>Pedido de oração</label>
    <textarea name="oracao"></textarea>
  </fieldset>

  <!-- OPINIÃO -->
  <fieldset>
    <legend>Opinião</legend>

    <p>Avaliação da igreja</p>

    <label><input type="radio" name="opiniao" value="otimo"> Ótimo</label>
    <label><input type="radio" name="opiniao" value="bom"> Bom</label>
    <label><input type="radio" name="opiniao" value="regular"> Regular</label>
    <label><input type="radio" name="opiniao" value="ruim"> Ruim</label>

    <label>Comentário</label>
    <textarea name="comentario"></textarea>
  </fieldset>

  <!-- CONFIRMAÇÃO -->
  <fieldset>
    <legend>Confirmação</legend>

    <label>
      <input type="checkbox" required />
      Autorizo o uso dos meus dados para cadastro da igreja
    </label>

    <label>
      <input type="checkbox" />
      Desejo receber informações por email
    </label>
  </fieldset>

  <button type="submit">Enviar</button>
  <button type="reset">Limpar</button>

</form>

</section>

<script src="./js/script.js"></script>

</body>
</html>
